[pytest]
# Indica a pytest que la raíz del proyecto NO es un paquete Python importable.
# Esto evita que el __init__.py raíz se cargue como paquete "cognia_v2".
addopts = --import-mode=importlib
testpaths = tests
markers =
    red: necesita salir a internet. Se salta solo si no hay conexion.
         Correr sin ellos: pytest -m "not red"
