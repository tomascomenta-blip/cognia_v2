name: Release

on:
  push:
    tags:
      - "v*"        # Python CLI + Desktop installer
      - "desktop-v*" # Desktop installer only
      - "mobile-v*"  # PWA deploy + Android APK

jobs:
  # ── Test gate (all tags) ───────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run test suite
        run: python -m pytest tests/ -x --tb=short -q

  # ── Python CLI → PyPI (only on v* tags) ───────────────────────────────
  publish-pypi:
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          pip install build --quiet
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          attestations: false

  # ── Windows installer (v* and desktop-v* tags) ────────────────────────
  release-windows:
    needs: [test]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install Node deps
        working-directory: cognia_desktop
        run: npm install

      - name: Build Windows installer
        working-directory: cognia_desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:win

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: cognia_desktop/dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Linux AppImage (v* and desktop-v* tags) ───────────────────────────
  release-linux:
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install Node deps
        working-directory: cognia_desktop
        run: npm install

      - name: Build Linux AppImage
        working-directory: cognia_desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:linux

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: cognia_desktop/dist/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── PWA deploy to Vercel (mobile-v* and v* tags) ─────────────────────
  deploy-pwa:
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/mobile-v') || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        working-directory: cognia_mobile
        run: npm install

      - name: Build web bundle
        working-directory: cognia_mobile
        run: npm run build:web

      - name: Deploy to Vercel
        working-directory: cognia_mobile
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel dist --prod --token "$VERCEL_TOKEN" --yes

  # ── Android APK (v* and mobile-v* tags) ──────────────────────────────
  release-android:
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/mobile-v') || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Node deps
        working-directory: cognia_mobile
        run: npm install

      - name: Expo prebuild
        working-directory: cognia_mobile
        run: npx expo prebuild --platform android --clean

      - name: Build APK
        working-directory: cognia_mobile/android
        run: ./gradlew assembleDebug

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: cognia_mobile/android/app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
