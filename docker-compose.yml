version: "3.9"

services:
  cognia:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./model_shards:/app/model_shards
    depends_on:
      - ollama
    restart: unless-stopped

  coordinator:
    build: .
    command: uvicorn coordinator.app:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    env_file:
      - .env
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data:
