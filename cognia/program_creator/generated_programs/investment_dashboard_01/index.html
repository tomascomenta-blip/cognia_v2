<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        .dashboard {
            width: 90%;
            max-width: 800px;
            background-color: #fff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #ddd;
        }
        .row:last-child {
            border-bottom: none;
        }
        .stock {
            font-weight: bold;
        }
        .price {
            font-size: 1.2em;
        }
        .up {
            color: green;
        }
        .down {
            color: red;
        }
        .chart {
            width: 100%;
            height: 200px;
            background-color: #f9f9f9;
            border: 1px solid #ddd;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="row">
            <div class="stock">AAPL</div>
            <div class="price" id="priceAAPL">150.00</div>
        </div>
        <div class="row">
            <div class="stock">GOOGL</div>
            <div class="price" id="priceGOOGL">2800.00</div>
        </div>
        <div class="row">
            <div class="stock">MSFT</div>
            <div class="price" id="priceMSFT">300.00</div>
        </div>
        <canvas class="chart" id="chart"></canvas>
    </div>

    <script>
        const stocks = ['AAPL', 'GOOGL', 'MSFT'];
        const prices = { AAPL: 150.00, GOOGL: 2800.00, MSFT: 300.00 };
        const priceElements = {
            AAPL: document.getElementById('priceAAPL'),
            GOOGL: document.getElementById('priceGOOGL'),
            MSFT: document.getElementById('priceMSFT')
        };
        const chart = document.getElementById('chart');
        const ctx = chart.getContext('2d');

        function updatePrices() {
            stocks.forEach(stock => {
                const change = (Math.random() - 0.5) * 2 * 2; // Random change between -2 and 2
                const newPrice = parseFloat(prices[stock]) + change;
                prices[stock] = newPrice.toFixed(2);
                const priceElement = priceElements[stock];
                priceElement.textContent = prices[stock];
                if (change > 0) {
                    priceElement.classList.add('up');
                    priceElement.classList.remove('down');
                } else if (change < 0) {
                    priceElement.classList.add('down');
                    priceElement.classList.remove('up');
                } else {
                    priceElement.classList.remove('up', 'down');
                }
            });
        }

        function drawChart() {
            ctx.clearRect(0, 0, chart.width, chart.height);
            ctx.beginPath();
            ctx.moveTo(0, chart.height / 2);
            stocks.forEach((stock, index) => {
                const y = (1 - (prices[stock] / 400)) * chart.height; // Scale prices to chart height
                ctx.lineTo((index + 1) * (chart.width / stocks.length), y);
            });
            ctx.strokeStyle = '#333';
            ctx.stroke();
        }

        setInterval(updatePrices, 2000);
        setInterval(drawChart, 2000);
    </script>
</body>
</html>
