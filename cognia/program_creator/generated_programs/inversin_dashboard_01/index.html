<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Inversión</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
        }
        .summary {
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
            text-align: center;
        }
        .chart {
            width: 100%;
            max-width: 600px;
            height: 300px;
            background-color: #fff;
            margin-bottom: 20px;
        }
        .table {
            width: 100%;
            max-width: 600px;
            border-collapse: collapse;
        }
        .table th, .table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        .table th {
            background-color: #f2f2f2;
        }
        .up {
            color: green;
        }
        .down {
            color: red;
        }
    </style>
</head>
<body>
    <div class="summary">
        <h1>Dashboard de Inversión</h1>
        <div id="total">Total: $10,000.00</div>
        <div id="variation">Variación: $0.00</div>
    </div>
    <div class="chart" id="chart"></div>
    <div class="table">
        <table>
            <thead>
                <tr>
                    <th>Acción</th>
                    <th>Cotización</th>
                    <th>Variación</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td>ABC</td>
                    <td id="quoteABC">$100.00</td>
                    <td id="variationABC" class="up">+$0.00</td>
                </tr>
                <tr>
                    <td>XYZ</td>
                    <td id="quoteXYZ">$200.00</td>
                    <td id="variationXYZ" class="up">+$0.00</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        const quotes = { ABC: 100, XYZ: 200 };
        const variations = { ABC: 0, XYZ: 0 };
        const chartData = [100, 200];

        function updateQuotes() {
            for (const stock in quotes) {
                const change = Math.random() * 5 - 2.5;
                quotes[stock] += change;
                variations[stock] = change.toFixed(2);

                document.getElementById(`quote${stock}`).textContent = `$${quotes[stock].toFixed(2)}`;
                document.getElementById(`variation${stock}`).textContent = `${variations[stock] >= 0 ? '+' : ''}${variations[stock]}`;
                document.getElementById(`variation${stock}`).classList = variations[stock] > 0 ? 'up' : 'down';
            }

            updateTotalAndVariation();
            updateChart();
        }

        function updateTotalAndVariation() {
            const total = Object.values(quotes).reduce((a, b) => a + b, 0);
            const variation = Object.values(variations).reduce((a, b) => parseFloat(a) + parseFloat(b), 0).toFixed(2);

            document.getElementById('total').textContent = `Total: $${total.toLocaleString()}`;
            document.getElementById('variation').textContent = `Variación: $${variation}`;
        }

        function updateChart() {
            const svg = document.getElementById('chart');
            const max = Math.max(...chartData);
            const min = Math.min(...chartData);
            const range = max - min;
            const step = range / 5;
            const width = svg.clientWidth;
            const height = svg.clientHeight;

            svg.innerHTML = `
                <g transform="translate(20, ${height - 20})">
                    <line x1="0" y1="0" x2="0" y2="-${height + 20}" stroke="#ddd" />
                    <line x1="0" y1="0" x2="${width - 20}" y2="0" stroke="#ddd" />
                    ${Array.from({ length: 6 }, (_, i) => `
                        <text x="-5" y="-${(height + 20) * (i / 5)}" text-anchor="end" alignment-baseline="middle">${(max - step * i).toFixed(2)}</text>
                        <line x1="0" y1="-${(height + 20) * (i / 5)}" x2="${width - 20}" y2="-${(height + 20) * (i / 5)}" stroke="#eee" stroke-dasharray="2" />
                    `).join('')}
                    ${chartData.map((value, i) => `
                        <circle cx="${(i / (chartData.length - 1)) * (width - 40) + 20}" cy="-${((value - min) / range) * (height + 20)}" r="3" fill="blue" />
                    `).join('')}
                </g>
            `;
        }

        setInterval(updateQuotes, 1000);
        updateQuotes(); // Render first frame immediately
    </script>
</body>
</html>
