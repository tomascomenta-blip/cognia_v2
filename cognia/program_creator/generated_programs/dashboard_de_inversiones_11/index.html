<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Inversiones</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
            color: #333;
        }
        .kpi {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }
        .kpi-tile {
            background: #fff;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            padding: 14px 16px;
            text-align: center;
        }
        .kpi-tile h4 {
            font-size: 12px;
            color: #52514e;
        }
        .kpi-tile h2 {
            font-size: 26px;
            font-weight: 650;
        }
        .kpi-tile p {
            font-size: 13px;
        }
        .kpi-tile.up p {
            color: #006300;
        }
        .kpi-tile.down p {
            color: #d03b3b;
        }
        svg {
            width: 100%;
            height: 220px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th, td {
            text-align: right;
            color: #898781;
            font-size: 12px;
            padding: 8px;
        }
        th {
            text-align: left;
        }
        td:nth-child(2) {
            text-align: right;
            font-variant-numeric: tabular-nums;
        }
        td:nth-child(3) {
            font-variant-numeric: tabular-nums;
        }
        .up td:nth-child(3) {
            color: #006300;
        }
        .down td:nth-child(3) {
            color: #d03b3b;
        }
    </style>
</head>
<body>
    <div class="kpi">
        <div class="kpi-tile" id="kpi-total">
            <h4>Valor de la cartera</h4>
            <h2 id="kpi-value">0,00 €</h2>
            <p id="kpi-change">0,00 €</p>
        </div>
    </div>
    <svg id="grafico"></svg>
    <table>
        <thead>
            <tr>
                <th>Simbolo</th>
                <th>Precio</th>
                <th>Cambio</th>
            </tr>
        </thead>
        <tbody id="posiciones"></tbody>
    </table>

    <script>
        class InvestmentDashboard {
            constructor() {
                this.cash = 0;
                this.prices = {};
                this.positions = [
                    { symbol: 'AAPL', price: 150 },
                    { symbol: 'GOOGL', price: 2700 },
                    { symbol: 'MSFT', price: 320 }
                ];
                this.updateKPI();
                this.updateChart();
                this.updateTable();
                setInterval(() => {
                    this.simulateData();
                    this.updateKPI();
                    this.updateChart();
                    this.updateTable();
                }, 1000);
            }

            simulateData() {
                this.positions.forEach(pos => {
                    pos.price += (Math.random() - 0.5) * 5;
                });
            }

            updateKPI() {
                const totalValue = this.positions.reduce((sum, pos) => sum + pos.price, 0);
                const change = totalValue - this.cash;
                this.cash = totalValue;
                document.getElementById('kpi-value').innerText = totalValue.toLocaleString('es-ES', { style: 'currency', currency: 'EUR' });
                document.getElementById('kpi-change').innerText = (change >= 0 ? '▲ ' : '▼ ') + Math.abs(change).toFixed(2) + ' €';
                document.getElementById('kpi-total').classList.toggle('up', change > 0);
                document.getElementById('kpi-total').classList.toggle('down', change < 0);
            }

            updateChart() {
                const prices = this.positions.map(pos => pos.price);
                const svg = document.getElementById('grafico');
                const M = { arriba: 12, abajo: 22, izq: 56, der: 12 }, W = 600, H = 220;
                const y0 = Math.min(...prices), y1 = Math.max(...prices);
                if (y1 - y0 < 1) { y0 -= 1; y1 += 1; }
                const x = i => M.izq + (W - M.izq - M.der) * i / Math.max(1, prices.length - 1);
                const y = v => M.arriba + (H - M.arriba - M.abajo) * (1 - (v - y0) / (y1 - y0));
                const linea = prices.map((v, i) => (i ? 'L' : 'M') + x(i).toFixed(1) + ',' + y(v).toFixed(1)).join('');
                let rejilla = '', etiquetas = '';
                for (let k = 0; k <= 3; k++) {
                    const v = y0 + (y1 - y0) * k / 3, yy = y(v).toFixed(1);
                    rejilla += `<line x1="${M.izq}" x2="${W - M.der}" y1="${yy}" y2="${yy}" stroke="#e1e0d9" stroke-width="1"/>`;
                    etiquetas += `<text x="${M.izq - 8}" y="${yy}" dy="4" text-anchor="end" font-size="11" fill="#898781">${Math.round(v).toLocaleString('es-ES')}</text>`;
                }
                svg.innerHTML = rejilla + etiquetas + `<path d="${linea}" fill="none" stroke="#2a78d6" stroke-width="2" stroke-linejoin="round"/>`;
            }

            updateTable() {
                const tbody = document.getElementById('posiciones');
                tbody.innerHTML = '';
                this.positions.forEach(pos => {
                    const row = document.createElement('tr');
                    const change = pos.price - this.prices[pos.symbol] || 0;
                    row.innerHTML = `
                        <td><strong>${pos.symbol}</strong></td>
                        <td style="font-variant-numeric: tabular-nums">${pos.price.toLocaleString('es-ES', { style: 'currency', currency: 'EUR' })}</td>
                        <td style="font-variant-numeric: tabular-nums">${(change >= 0 ? '▲ ' : '▼ ') + Math.abs(change).toFixed(2)}</td>
                    `;
                    row.classList.toggle('up', change > 0);
                    row.classList.toggle('down', change < 0);
                    tbody.appendChild(row);
                    this.prices[pos.symbol] = pos.price;
                });
            }
        }

        new InvestmentDashboard();
    </script>
</body>
</html>
