<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f4f9; }
        .dashboard { width: 100%; max-width: 600px; padding: 20px; background-color: #fff; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .row span { font-weight: bold; }
        .up { color: green; }
        .down { color: red; }
        canvas { width: 100%; height: 200px; }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>Investment Dashboard</h1>
        <div class="row">
            <span>Stock A</span>
            <span id="stockA">100.00</span>
        </div>
        <div class="row">
            <span>Stock B</span>
            <span id="stockB">150.00</span>
        </div>
        <canvas id="chart"></canvas>
    </div>

    <script>
        const stocks = { A: 100, B: 150 };
        const ctx = document.getElementById('chart').getContext('2d');
        const chartData = { labels: [], datasets: [{ label: 'Stock Prices', data: [], borderColor: 'blue', fill: false }] };

        function updateStocks() {
            for (const stock in stocks) {
                const element = document.getElementById(`stock${stock}`);
                const change = Math.random() * 2 - 1;
                stocks[stock] += change;
                element.textContent = stocks[stock].toFixed(2);
                element.className = change > 0 ? 'up' : change < 0 ? 'down' : '';
            }
        }

        function updateChart() {
            chartData.labels.push(new Date().toLocaleTimeString());
            chartData.datasets[0].data.push(stocks.A);
            if (chartData.labels.length > 10) {
                chartData.labels.shift();
                chartData.datasets[0].data.shift();
            }
            ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
            ctx.beginPath();
            ctx.moveTo(0, ctx.canvas.height - (chartData.datasets[0].data[0] / 300 * ctx.canvas.height));
            for (let i = 1; i < chartData.datasets[0].data.length; i++) {
                ctx.lineTo(i * (ctx.canvas.width / chartData.datasets[0].data.length), ctx.canvas.height - (chartData.datasets[0].data[i] / 300 * ctx.canvas.height));
            }
            ctx.stroke();
        }

        setInterval(updateStocks, 1000);
        setInterval(updateChart, 1000);
    </script>
</body>
</html>
