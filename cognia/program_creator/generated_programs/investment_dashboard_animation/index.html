<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .dashboard {
            width: 100%;
            max-width: 600px;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .quotes {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }
        .quote {
            text-align: center;
        }
        .quote span {
            font-size: 24px;
            font-weight: bold;
            margin-top: 5px;
        }
        .chart-container {
            width: 100%;
            height: 200px;
            margin-bottom: 20px;
        }
        .chart {
            width: 100%;
            height: 100%;
            background: #f0f0f0;
        }
        .variations {
            display: flex;
            justify-content: space-around;
            font-size: 18px;
        }
        .variation.up {
            color: green;
        }
        .variation.down {
            color: red;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>Investment Dashboard</h1>
        <div class="quotes">
            <div class="quote">AAPL: <span id="quoteAAPL">150.00</span></div>
            <div class="quote">GOOGL: <span id="quoteGOOGL">2800.00</span></div>
            <div class="quote">AMZN: <span id="quoteAMZN">3500.00</span></div>
        </div>
        <div class="chart-container">
            <canvas class="chart" id="chart"></canvas>
        </div>
        <div class="variations">
            <div class="variation up" id="varAAPL">+2.5%</div>
            <div class="variation down" id="varGOOGL">-1.3%</div>
            <div class="variation up" id="varAMZN">+3.8%</div>
        </div>
    </div>

    <script>
        const quotes = ['AAPL', 'GOOGL', 'AMZN'];
        const quoteElements = quotes.map(stock => document.getElementById(`quote${stock}`));
        const variationElements = quotes.map(stock => document.getElementById(`var${stock}`));
        const chart = document.getElementById('chart').getContext('2d');

        function updateQuotes() {
            quotes.forEach((stock, index) => {
                const currentPrice = parseFloat(quoteElements[index].innerText);
                const change = (Math.random() - 0.5) * 5;
                const newPrice = currentPrice + change;
                quoteElements[index].innerText = newPrice.toFixed(2);
                const variation = change > 0 ? `+${change.toFixed(2)}%` : `${change.toFixed(2)}%`;
                variationElements[index].innerText = variation;
                variationElements[index].classList = change > 0 ? 'variation up' : 'variation down';
            });
        }

        function drawChart() {
            const data = quotes.map(stock => parseFloat(quoteElements[quotes.indexOf(stock)].innerText));
            chart.clearRect(0, 0, chart.canvas.width, chart.canvas.height);
            chart.fillStyle = '#333';
            const barWidth = chart.canvas.width / quotes.length;
            data.forEach((value, index) => {
                const barHeight = (value / 5000) * chart.canvas.height;
                chart.fillRect(index * barWidth, chart.canvas.height - barHeight, barWidth, barHeight);
            });
        }

        setInterval(updateQuotes, 2000);
        setInterval(drawChart, 2000);
    </script>
</body>
</html>
