<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .dashboard {
            width: 90%;
            max-width: 600px;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .quote {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        .quote:last-child {
            border-bottom: none;
        }
        .quote span {
            font-size: 1.2em;
        }
        .quote.up span {
            color: green;
        }
        .quote.down span {
            color: red;
        }
        canvas {
            width: 100%;
            height: 200px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="quote" id="stock1">
            <span>Stock A: $100</span>
        </div>
        <div class="quote" id="stock2">
            <span>Stock B: $200</span>
        </div>
        <div class="quote" id="stock3">
            <span>Stock C: $150</span>
        </div>
        <canvas id="chart"></canvas>
    </div>
    <script>
        const stocks = [
            { id: 'stock1', value: 100, element: document.getElementById('stock1') },
            { id: 'stock2', value: 200, element: document.getElementById('stock2') },
            { id: 'stock3', value: 150, element: document.getElementById('stock3') }
        ];

        function updateStockValues() {
            stocks.forEach(stock => {
                const change = Math.random() * 20 - 10; // Random change between -10 and 10
                stock.value += change;
                stock.element.innerHTML = `<span class="${change > 0 ? 'up' : 'down'}">${stock.id.split('stock')[1]}: $${stock.value.toFixed(2)}</span>`;
            });
        }

        setInterval(updateStockValues, 2000);

        const canvas = document.getElementById('chart');
        const ctx = canvas.getContext('2d');

        function drawChart() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.moveTo(0, canvas.height - stocks[0].value * 2);
            for (let i = 1; i < stocks.length; i++) {
                ctx.lineTo(i * (canvas.width / (stocks.length - 1)), canvas.height - stocks[i].value * 2);
            }
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        setInterval(drawChart, 500);
    </script>
</body>
</html>
