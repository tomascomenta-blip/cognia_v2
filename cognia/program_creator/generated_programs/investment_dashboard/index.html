<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
        }
        .dashboard {
            width: 100%;
            max-width: 800px;
            background-color: #fff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
            border-radius: 8px;
        }
        .quotes {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }
        .quote {
            background-color: #e9e9e9;
            padding: 10px;
            border-radius: 4px;
            flex: 1 1 200px;
        }
        .quote span {
            display: block;
            font-weight: bold;
        }
        .chart-container {
            width: 100%;
            height: 300px;
            background-color: #fff;
            border-radius: 4px;
            position: relative;
        }
        .chart {
            width: 100%;
            height: 100%;
        }
        .variations {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .variation {
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
        }
        .up {
            background-color: #e6ffe6;
            color: #008000;
        }
        .down {
            background-color: #ffe6e6;
            color: #ff0000;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>Investment Dashboard</h1>
        <div class="quotes">
            <div class="quote" id="quote1">
                <span>Stock A:</span>
                <span id="stockA">100.00</span>
            </div>
            <div class="quote" id="quote2">
                <span>Stock B:</span>
                <span id="stockB">150.00</span>
            </div>
            <div class="quote" id="quote3">
                <span>Stock C:</span>
                <span id="stockC">200.00</span>
            </div>
        </div>
        <div class="chart-container">
            <canvas class="chart" id="chart"></canvas>
        </div>
        <div class="variations" id="variations">
            <div class="variation up">+5.00</div>
            <div class="variation down">-3.00</div>
            <div class="variation up">+10.00</div>
        </div>
    </div>

    <script>
        const quotes = {
            stockA: 100.00,
            stockB: 150.00,
            stockC: 200.00
        };

        const chartData = {
            labels: Array.from({ length: 60 }, (_, i) => i),
            data: Array.from({ length: 60 }, () => Math.random() * 50 + 50),
        };

        function updateQuotes() {
            for (const stock in quotes) {
                const currentPrice = quotes[stock];
                const change = (Math.random() - 0.5) * 2; // Random change between -1 and 1
                const newPrice = parseFloat((currentPrice + change).toFixed(2));
                quotes[stock] = newPrice;
                document.getElementById(stock).innerText = newPrice.toFixed(2);
            }
        }

        function updateChart() {
            const ctx = document.getElementById('chart').getContext('2d');
            ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);

            ctx.beginPath();
            ctx.moveTo(0, chartData.data[0]);
            for (let i = 1; i < chartData.data.length; i++) {
                ctx.lineTo(i, chartData.data[i]);
            }
            ctx.strokeStyle = '#000';
            ctx.stroke();

            // Shift data and add a new random value
            chartData.data.shift();
            chartData.data.push(Math.random() * 50 + 50);
        }

        function updateVariations() {
            const variations = document.getElementById('variations');
            variations.innerHTML = ''; // Clear existing variations

            for (let i = 0; i < 3; i++) {
                const change = (Math.random() - 0.5) * 20; // Random change between -10 and 10
                const div = document.createElement('div');
                div.classList.add('variation');
                if (change > 0) {
                    div.classList.add('up');
                } else {
                    div.classList.add('down');
                }
                div.innerText = change.toFixed(2);
                variations.appendChild(div);
            }
        }

        setInterval(() => {
            updateQuotes();
            updateChart();
            updateVariations();
        }, 1000);

        // Initial draw of chart
        updateChart();
    </script>
</body>
</html>
