<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Inversiones</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
        }
        .summary {
            margin-bottom: 20px;
            text-align: center;
        }
        .summary h2 {
            margin: 0;
            font-size: 24px;
            color: #333;
        }
        .summary p {
            margin: 5px 0 0;
            font-size: 18px;
            color: #666;
        }
        .chart {
            width: 100%;
            max-width: 600px;
            height: 400px;
            margin-bottom: 20px;
        }
        .table {
            width: 100%;
            max-width: 600px;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        .table th, .table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        .table th {
            background-color: #f2f2f2;
        }
        .row.up {
            color: green;
        }
        .row.down {
            color: red;
        }
    </style>
</head>
<body>
    <div class="summary">
        <h2>Dashboard de Inversiones</h2>
        <p>Total: <span id="totalValue">$0.00</span></p>
    </div>
    <canvas class="chart" id="investmentChart"></canvas>
    <table class="table" id="investmentTable">
        <thead>
            <tr>
                <th>Acción</th>
                <th>Cotización</th>
                <th>Var.</th>
            </tr>
        </thead>
        <tbody>
            <!-- Rows will be generated by JavaScript -->
        </tbody>
    </table>

    <script>
        const NUM_ASSETS = 5;
        const INITIAL_VALUE = 10000;
        const PRICE_CHANGE_MIN = -2;
        const PRICE_CHANGE_MAX = 2;
        const CHART_UPDATE_INTERVAL = 1000;
        const TABLE_UPDATE_INTERVAL = 1000;

        let totalValue = INITIAL_VALUE;
        let assets = [];

        function initializeAssets() {
            for (let i = 0; i < NUM_ASSETS; i++) {
                assets.push({
                    name: `Acción ${i + 1}`,
                    price: INITIAL_VALUE / NUM_ASSETS,
                    change: 0
                });
            }
            updateTotalValue();
            updateSummary();
            updateTable();
            updateChart();
        }

        function updateTotalValue() {
            totalValue = assets.reduce((acc, asset) => acc + asset.price, 0);
        }

        function updateSummary() {
            document.getElementById('totalValue').textContent = totalValue.toLocaleString('es-ES', { style: 'currency', currency: 'USD' });
        }

        function updateTable() {
            const tableBody = document.querySelector('#investmentTable tbody');
            tableBody.innerHTML = '';
            assets.forEach(asset => {
                const row = document.createElement('tr');
                row.classList.add(asset.change > 0 ? 'up' : 'down');
                row.innerHTML = `
                    <td>${asset.name}</td>
                    <td>${asset.price.toLocaleString('es-ES', { style: 'currency', currency: 'USD' })}</td>
                    <td>${asset.change.toFixed(2)}%</td>
                `;
                tableBody.appendChild(row);
            });
        }

        function updateChart() {
            const canvas = document.getElementById('investmentChart');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;

            const prices = assets.map(asset => asset.price);
            const minPrice = Math.min(...prices);
            const maxPrice = Math.max(...prices);
            const range = maxPrice - minPrice;

            const xStep = canvas.width / NUM_ASSETS;
            const yStep = canvas.height / range;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.moveTo(0, canvas.height - (prices[0] - minPrice) * yStep);

            for (let i = 1; i < NUM_ASSETS; i++) {
                ctx.lineTo(i * xStep, canvas.height - (prices[i] - minPrice) * yStep);
            }
            ctx.strokeStyle = '#333';
            ctx.stroke();

            // Draw gridlines
            ctx.strokeStyle = '#ddd';
            for (let i = 0; i <= maxPrice; i += 1000) {
                ctx.beginPath();
                ctx.moveTo(0, canvas.height - (i - minPrice) * yStep);
                ctx.lineTo(canvas.width, canvas.height - (i - minPrice) * yStep);
                ctx.stroke();
            }
        }

        function updateAssets() {
            assets.forEach(asset => {
                asset.change = (Math.random() * (PRICE_CHANGE_MAX - PRICE_CHANGE_MIN) + PRICE_CHANGE_MIN);
                asset.price += asset.price * (asset.change / 100);
            });
            updateTotalValue();
            updateSummary();
            updateTable();
            updateChart();
        }

        initializeAssets();
        setInterval(updateAssets, TABLE_UPDATE_INTERVAL);
        setInterval(updateChart, CHART_UPDATE_INTERVAL);
    </script>
</body>
</html>
