<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
        }
        .dashboard {
            width: 100%;
            max-width: 600px;
            background-color: #fff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
        .stock-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        .stock-row:last-child {
            border-bottom: none;
        }
        .stock-name {
            font-weight: bold;
        }
        .stock-price {
            font-weight: bold;
        }
        .stock-change {
            font-weight: bold;
        }
        .up {
            color: green;
        }
        .down {
            color: red;
        }
        canvas {
            width: 100%;
            height: 200px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>Investment Dashboard</h1>
        <div class="stock-quotes">
            <div class="stock-row" data-symbol="AAPL">
                <span class="stock-name">AAPL</span>
                <span class="stock-price">150.00</span>
                <span class="stock-change">+0.50</span>
            </div>
            <div class="stock-row" data-symbol="GOOGL">
                <span class="stock-name">GOOGL</span>
                <span class="stock-price">2800.00</span>
                <span class="stock-change">-20.00</span>
            </div>
            <div class="stock-row" data-symbol="MSFT">
                <span class="stock-name">MSFT</span>
                <span class="stock-price">300.00</span>
                <span class="stock-change">+10.00</span>
            </div>
        </div>
        <canvas id="stockChart"></canvas>
    </div>

    <script>
        const UPDATE_INTERVAL = 1000;
        const GRAPH_UPDATE_INTERVAL = 1000;
        const MAX_PRICE_CHANGE = 5;
        const DATA_POINTS = 100;

        let chartData = Array.from({ length: DATA_POINTS }, () => Math.random() * 500);

        function updateStockQuotes() {
            const stockRows = document.querySelectorAll('.stock-row');

            stockRows.forEach(row => {
                const currentPrice = parseFloat(row.querySelector('.stock-price').textContent);
                const change = (Math.random() - 0.5) * MAX_PRICE_CHANGE;
                const newPrice = currentPrice + change;

                row.querySelector('.stock-price').textContent = newPrice.toFixed(2);
                row.querySelector('.stock-change').textContent = (change > 0 ? '+' : '') + change.toFixed(2);

                if (change > 0) {
                    row.classList.add('up');
                    row.classList.remove('down');
                } else if (change < 0) {
                    row.classList.add('down');
                    row.classList.remove('up');
                } else {
                    row.classList.remove('up', 'down');
                }
            });
        }

        function updateChartData() {
            const lastPrice = chartData[chartData.length - 1];
            const change = (Math.random() - 0.5) * MAX_PRICE_CHANGE;
            const newPrice = lastPrice + change;

            chartData.shift();
            chartData.push(newPrice);
        }

        function drawChart() {
            const canvas = document.getElementById('stockChart');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const xScale = canvas.width / (DATA_POINTS - 1);
            const yScale = canvas.height / (Math.max(...chartData) + Math.min(...chartData));

            ctx.beginPath();
            ctx.moveTo(0, canvas.height - (chartData[0] - Math.min(...chartData)) * yScale);

            for (let i = 1; i < chartData.length; i++) {
                ctx.lineTo(i * xScale, canvas.height - (chartData[i] - Math.min(...chartData)) * yScale);
            }

            ctx.strokeStyle = '#007bff';
            ctx.stroke();
        }

        setInterval(updateStockQuotes, UPDATE_INTERVAL);
        setInterval(() => {
            updateChartData();
            drawChart();
        }, GRAPH_UPDATE_INTERVAL);
    </script>
</body>
</html>
