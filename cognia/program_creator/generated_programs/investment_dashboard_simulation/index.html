<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Dashboard Simulation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            background-color: #f0f0f0;
        }
        .dashboard {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 800px;
        }
        .quotes {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }
        .quote {
            text-align: center;
        }
        canvas {
            width: 100%;
            height: 300px;
            background-color: #fff;
        }
        .variation {
            color: green;
        }
        .variation.down {
            color: red;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <h1>Investment Dashboard</h1>
        <div class="quotes">
            <div class="quote" id="stock1">
                <h3>Stock A</h3>
                <p>$<span id="stock1-price">100</span></p>
                <p class="variation" id="stock1-variation">+0.5%</p>
            </div>
            <div class="quote" id="stock2">
                <h3>Stock B</h3>
                <p>$<span id="stock2-price">200</span></p>
                <p class="variation" id="stock2-variation">-1.2%</p>
            </div>
            <div class="quote" id="stock3">
                <h3>Stock C</h3>
                <p>$<span id="stock3-price">150</span></p>
                <p class="variation" id="stock3-variation">+0.8%</p>
            </div>
        </div>
        <canvas id="stockChart"></canvas>
    </div>
    <script>
        class Stock {
            constructor(id, name, initialPrice) {
                this.id = id;
                this.name = name;
                this.price = initialPrice;
                this.update();
            }

            update() {
                setInterval(() => {
                    const change = (Math.random() - 0.5) * 2; // Random change between -1% and 1%
                    this.price += this.price * (change / 100);
                    this.display();
                }, 2000);
            }

            display() {
                const priceElement = document.getElementById(`${this.id}-price`);
                const variationElement = document.getElementById(`${this.id}-variation`);
                priceElement.textContent = this.price.toFixed(2);
                const variation = ((this.price - 100) / 100).toFixed(2) + '%';
                variationElement.textContent = variation;
                variationElement.classList.toggle('down', change < 0);
            }
        }

        class StockChart {
            constructor(canvasId) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.data = [];
                this.update();
            }

            update() {
                setInterval(() => {
                    this.data.push(Math.random() * 100);
                    if (this.data.length > 20) {
                        this.data.shift();
                    }
                    this.draw();
                }, 1000);
            }

            draw() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.ctx.beginPath();
                for (let i = 0; i < this.data.length; i++) {
                    const x = i * (this.canvas.width / this.data.length);
                    const y = this.canvas.height - (this.data[i] * this.canvas.height / 100);
                    if (i === 0) {
                        this.ctx.moveTo(x, y);
                    } else {
                        this.ctx.lineTo(x, y);
                    }
                }
                this.ctx.strokeStyle = '#007bff';
                this.ctx.stroke();
            }
        }

        // Main execution
        const stock1 = new Stock('stock1', 'Stock A', 100);
        const stock2 = new Stock('stock2', 'Stock B', 200);
        const stock3 = new Stock('stock3', 'Stock C', 150);
        const stockChart = new StockChart('stockChart');
    </script>
</body>
</html>
