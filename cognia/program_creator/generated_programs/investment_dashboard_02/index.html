<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investment Dashboard</title>
<style>
body {
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}
#quotes {
  margin: 20px 0;
}
.quote {
  font-size: 1.2em;
  margin: 5px 0;
}
.quote.up {
  color: green;
}
.quote.down {
  color: red;
}
canvas {
  border: 1px solid #ccc;
}
</style>
</head>
<body>

<h1>Investment Dashboard</h1>
<div id="quotes"></div>
<canvas id="graph" width="300" height="200"></canvas>

<script>
const quotes = ['AAPL', 'GOOGL', 'MSFT', 'AMZN'];
const quoteValues = {};
const ctx = document.getElementById('graph').getContext('2d');
const quotesDiv = document.getElementById('quotes');

function updateQuotes() {
  quotes.forEach(stock => {
    const value = (quoteValues[stock] || 100) + (Math.random() * 5 - 2.5);
    quoteValues[stock] = value;
    const isUp = value > quoteValues[stock] - 2.5;
    const quoteElement = document.getElementById(`quote-${stock}`);
    if (quoteElement) {
      quoteElement.textContent = `${stock}: ${value.toFixed(2)}`;
      quoteElement.className = isUp ? 'quote up' : 'quote down';
    } else {
      const row = document.createElement('div');
      row.id = `quote-${stock}`;
      row.className = isUp ? 'quote up' : 'quote down';
      row.textContent = `${stock}: ${value.toFixed(2)}`;
      quotesDiv.appendChild(row);
    }
  });
}

function drawGraph() {
  ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
  ctx.beginPath();
  ctx.moveTo(0, ctx.canvas.height / 2);
  let x = 0;
  for (const value of Object.values(quoteValues)) {
    const y = ctx.canvas.height - (value / 500) * ctx.canvas.height;
    ctx.lineTo(x, y);
    x += ctx.canvas.width / quotes.length;
  }
  ctx.strokeStyle = '#333';
  ctx.stroke();
}

setInterval(updateQuotes, 2000);
setInterval(drawGraph, 2000);
</script>

</body>
</html>
