<!-- PATRON: fila de tiles KPI para la cabecera de un dashboard.
     Por que funciona: los numeros grandes arriba dan jerarquia visual (algo
     domina la vista); el delta con flecha + color nunca comunica por color
     solo; grid auto-fit lo hace responsive sin media queries. -->
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px">
  <div style="background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:10px;padding:14px 16px">
    <div style="font-size:12px;color:#52514e">Valor de la cartera</div>
    <div style="font-size:26px;font-weight:650" id="kpi-total">14.324,53 €</div>
    <div style="font-size:13px;color:#006300" id="kpi-delta">▲ +171,93 € desde apertura</div>
    <!-- si baja: color:#d03b3b y flecha ▼ — SIEMPRE flecha + color, no color solo -->
  </div>
</div>
