<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0e1613">
<title>Cognia Remoto</title>
<style>
  /* ── Temas: oscuro (verde oscuro, no muy oscuro) por defecto; claro funcional ── */
  :root, :root[data-tema="oscuro"] {
    color-scheme: dark;
    --fondo: #0e1613; --panel: #142019; --panel-2: #1a2921;
    --borde: #23392e; --texto: #e8f2ec; --texto-2: #9fb8aa;
    --acento: #2ea86c; --acento-2: #1d7a4c;
    --burbuja-yo: #1d5c3d; --burbuja-cognia: #1a2921;
    --peligro: #d05050; --sombra: 0 2px 10px rgba(0,0,0,.35);
  }
  :root[data-tema="claro"] {
    color-scheme: light;
    --fondo: #f2f6f3; --panel: #ffffff; --panel-2: #e9f0eb;
    --borde: #cfe0d5; --texto: #14261c; --texto-2: #4e6a5a;
    --acento: #1d7a4c; --acento-2: #2ea86c;
    --burbuja-yo: #cdeeda; --burbuja-cognia: #ffffff;
    --peligro: #b83a3a; --sombra: 0 2px 10px rgba(20,60,40,.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--fondo); color: var(--texto);
    display: flex; flex-direction: column; overflow: hidden; }
  button { font: inherit; border: none; background: none; color: inherit; cursor: pointer; }
  svg.ic { fill: none; stroke: currentColor; stroke-width: 1.8;
    stroke-linecap: round; stroke-linejoin: round; flex: 0 0 auto; }

  header { display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    background: var(--panel); border-bottom: 1px solid var(--borde);
    box-shadow: var(--sombra); z-index: 30; flex: 0 0 auto; }
  header .icono { width: 38px; height: 38px; display: grid; place-items: center;
    border-radius: 10px; background: var(--panel-2); }
  header .icono:active { background: var(--acento-2); }
  #titulo { flex: 1; min-width: 0; }
  #titulo .nombre { font-weight: 650; font-size: 15px; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; }
  #titulo .sub { font-size: 12px; color: var(--texto-2); }
  .punto { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: var(--texto-2); margin-right: 5px; }
  .punto.vivo { background: var(--acento); }

  .cajon { position: fixed; top: 0; bottom: 0; width: min(88vw, 360px);
    background: var(--panel); z-index: 50; transition: transform .22s ease;
    display: flex; flex-direction: column; box-shadow: var(--sombra); }
  #cajon-izq { left: 0; transform: translateX(-105%); border-right: 1px solid var(--borde); }
  #cajon-izq.abierto { transform: none; }
  #cajon-der { right: 0; transform: translateX(105%); border-left: 1px solid var(--borde); }
  #cajon-der.abierto { transform: none; }
  #velo { position: fixed; inset: 0; background: rgba(0,0,0,.45); opacity: 0;
    pointer-events: none; transition: opacity .2s; z-index: 40; }
  #velo.activo { opacity: 1; pointer-events: auto; }

  .cajon h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .06em;
    color: var(--texto-2); padding: 14px 14px 8px; }
  .cajon .lista { overflow-y: auto; flex: 1; }
  .fila { display: flex; align-items: center; gap: 10px; padding: 11px 14px;
    border-bottom: 1px solid var(--borde); cursor: pointer; }
  .fila:active { background: var(--panel-2); }
  .fila .avatar { width: 40px; height: 40px; border-radius: 12px;
    background: var(--acento-2); color: #fff; display: grid; place-items: center;
    font-weight: 700; }
  .fila .datos { flex: 1; min-width: 0; }
  .fila .datos .n { font-weight: 600; font-size: 14px; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; }
  .fila .datos .d { font-size: 12px; color: var(--texto-2); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; }
  .fila .borrar { color: var(--peligro); padding: 8px; }
  .accion-cajon { margin: 10px 14px; padding: 11px; border-radius: 12px;
    background: var(--acento); color: #fff; font-weight: 650;
    width: calc(100% - 28px); display: flex; gap: 8px; align-items: center;
    justify-content: center; }

  #chat { flex: 1 1 0; overflow-y: auto; padding: 12px 10px 18px;
    display: flex; flex-direction: column; gap: 6px; scroll-behavior: smooth; }
  .msg { max-width: 86%; padding: 8px 11px; border-radius: 14px; font-size: 14px;
    line-height: 1.45; word-wrap: break-word; white-space: pre-wrap;
    border: 1px solid var(--borde); }
  .msg .hora { display: block; font-size: 10px; color: var(--texto-2);
    margin-top: 3px; text-align: right; }
  .msg.yo { align-self: flex-end; background: var(--burbuja-yo);
    border-bottom-right-radius: 4px; }
  .msg.cognia { align-self: flex-start; background: var(--burbuja-cognia);
    border-bottom-left-radius: 4px; }
  .msg.sistema { align-self: center; background: none; border: none;
    color: var(--texto-2); font-size: 12px; padding: 2px; }
  .msg.pensando { align-self: flex-start; color: var(--texto-2); font-size: 12.5px;
    background: none; border-left: 2px solid var(--acento-2); border-radius: 0;
    padding: 2px 10px; font-family: ui-monospace, monospace; }
  .msg.accion { align-self: flex-start; color: var(--acento); font-size: 12.5px;
    background: none; border: 1px dashed var(--acento-2);
    font-family: ui-monospace, monospace; }
  .msg img.inline { max-width: 100%; border-radius: 10px; display: block;
    margin-top: 4px; }
  /* respuesta de Cognia: UN bloque continuo, sin globo, markdown renderizado */
  .msg.cognia.bloque { align-self: stretch; max-width: 100%; width: 100%;
    background: none; border: none; border-left: 3px solid var(--acento-2);
    border-radius: 0; padding: 4px 12px; white-space: normal; }
  .md { white-space: normal; }
  .md > *:first-child { margin-top: 0; }
  .md > *:last-child { margin-bottom: 0; }
  .md p { margin: 6px 0; }
  .md h1, .md h2, .md h3, .md h4, .md h5, .md h6 {
    margin: 12px 0 6px; line-height: 1.25; color: var(--texto); font-weight: 700; }
  .md h1 { font-size: 18px; } .md h2 { font-size: 16.5px; }
  .md h3 { font-size: 15px; } .md h4, .md h5, .md h6 { font-size: 14px; }
  .md ul, .md ol { margin: 6px 0; padding-left: 22px; }
  .md li { margin: 2px 0; }
  .md strong { font-weight: 700; color: var(--texto); }
  .md em { font-style: italic; }
  .md a { color: var(--acento); text-decoration: underline; }
  .md code { font-family: ui-monospace, monospace; font-size: 12.5px;
    background: var(--panel); border: 1px solid var(--borde);
    border-radius: 4px; padding: 1px 4px; }
  .md pre { background: var(--panel); border: 1px solid var(--borde);
    border-radius: 8px; padding: 9px 11px; margin: 8px 0; overflow-x: auto; }
  .md pre code { background: none; border: none; padding: 0; font-size: 12px;
    line-height: 1.5; display: block; white-space: pre; }
  .md blockquote { margin: 6px 0; padding-left: 10px; color: var(--texto-2);
    border-left: 2px solid var(--borde); }
  .md hr { border: none; border-top: 1px solid var(--borde); margin: 10px 0; }
  .md table { border-collapse: collapse; margin: 8px 0; font-size: 12.5px; }
  .md th, .md td { border: 1px solid var(--borde); padding: 3px 8px; }
  /* bloque de ACTIVIDAD: lo que Cognia hace, agrupado y plegable */
  details.actividad { align-self: flex-start; max-width: 92%; width: 92%;
    background: var(--panel); border: 1px solid var(--acento-2);
    border-radius: 12px; overflow: hidden;
    /* el chat es flex-column: sin esto, overflow:hidden deja min-height=0
       y el flex APLASTA el bloque a 2px (solo se veia la linea verde) */
    flex-shrink: 0; }
  details.actividad > summary { list-style: none; display: flex; gap: 8px;
    align-items: center; padding: 8px 11px; cursor: pointer; font-size: 12.5px;
    color: var(--acento); font-weight: 600; }
  details.actividad > summary::-webkit-details-marker { display: none; }
  details.actividad > summary .mas-menos { margin-left: auto; width: 18px;
    height: 18px; border-radius: 5px; background: var(--acento-2); color: #fff;
    display: grid; place-items: center; font-weight: 700; font-size: 13px; }
  details.actividad > summary .mas-menos::before { content: "+"; }
  details.actividad[open] > summary .mas-menos::before { content: "−"; }
  details.actividad .items { padding: 0 10px 8px; display: flex;
    flex-direction: column; gap: 3px; }
  .act-linea { font-family: ui-monospace, monospace; font-size: 11.5px;
    color: var(--texto-2); border-left: 2px solid var(--borde);
    padding: 2px 8px; word-break: break-word; white-space: pre-wrap; }
  details.act-larga { border-left: 2px solid var(--acento-2); }
  details.act-larga > summary { list-style: none; cursor: pointer;
    font-family: ui-monospace, monospace; font-size: 11.5px;
    color: var(--texto-2); padding: 2px 8px; display: flex; gap: 6px; }
  details.act-larga > summary::-webkit-details-marker { display: none; }
  details.act-larga > summary::before { content: "+"; color: var(--acento);
    font-weight: 700; }
  details.act-larga[open] > summary::before { content: "2"; }
  details.act-larga > pre { margin: 2px 8px 6px; padding: 6px;
    background: var(--panel-2); border-radius: 6px; font-size: 11px;
    white-space: pre-wrap; word-break: break-word; max-height: 45vh;
    overflow-y: auto; }
  #saludo { text-align: center; color: var(--texto-2); padding: 22px 18px;
    font-size: 15px; }
  #saludo b { color: var(--acento); }

  #compositor { flex: 0 0 auto; display: flex; gap: 8px; align-items: flex-end;
    padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
    background: var(--panel); border-top: 1px solid var(--borde); }
  #entrada { flex: 1; resize: none; max-height: 110px; min-height: 42px;
    padding: 10px 12px; border-radius: 14px; border: 1px solid var(--borde);
    background: var(--panel-2); color: var(--texto); font: inherit; outline: none; }
  #entrada:focus { border-color: var(--acento-2); }
  #enviar { width: 44px; height: 44px; border-radius: 50%;
    background: var(--acento); color: #fff; display: grid; place-items: center; }

  #sugerencias { position: absolute; left: 8px; right: 8px; bottom: 64px;
    background: var(--panel); border: 1px solid var(--borde); border-radius: 14px;
    max-height: 42vh; overflow-y: auto; box-shadow: var(--sombra);
    display: none; z-index: 25; }
  #sugerencias.visible { display: block; }
  .sug { padding: 10px 12px; border-bottom: 1px solid var(--borde); cursor: pointer; }
  .sug:active { background: var(--panel-2); }
  .sug .c { font-family: ui-monospace, monospace; color: var(--acento); font-size: 13px; }
  .sug .d { font-size: 12px; color: var(--texto-2); margin-top: 1px; }

  #controles { display: flex; gap: 6px; overflow-x: auto; padding: 6px 10px;
    background: var(--panel); border-top: 1px solid var(--borde); flex: 0 0 auto; }
  .chip { flex: 0 0 auto; display: flex; gap: 6px; align-items: center;
    padding: 6px 12px; border-radius: 999px; background: var(--panel-2);
    border: 1px solid var(--borde); font-size: 12.5px; color: var(--texto-2); }
  .chip:active { background: var(--acento-2); color: #fff; }

  /* ── Paneles desplegables + pantalla completa ── */
  .desplegable { border-bottom: 1px solid var(--borde); background: var(--panel); }
  .desplegable > summary { list-style: none; display: flex; align-items: center;
    gap: 10px; padding: 13px 14px; cursor: pointer; font-weight: 600; font-size: 14px; }
  .desplegable > summary::-webkit-details-marker { display: none; }
  .desplegable > summary .expandir { margin-left: auto; color: var(--texto-2);
    padding: 4px; }
  .desplegable > summary .flecha { color: var(--texto-2); transition: transform .15s; }
  .desplegable[open] > summary .flecha { transform: rotate(90deg); }
  .desplegable .cuerpo { padding: 4px 14px 14px; font-size: 13px;
    color: var(--texto-2); max-height: 44vh; overflow-y: auto; }
  /* pantalla completa: el details se vuelve una capa fija */
  .desplegable.lleno { position: fixed; inset: 0; z-index: 70; border: none;
    display: flex; flex-direction: column; background: var(--fondo); }
  .desplegable.lleno > summary { background: var(--panel);
    border-bottom: 1px solid var(--borde); }
  .desplegable.lleno .cuerpo { max-height: none; flex: 1; padding: 10px; }
  .desplegable.lleno iframe { height: 100% !important; }

  .cuerpo pre { white-space: pre-wrap; font-size: 11.5px;
    font-family: ui-monospace, monospace; background: var(--panel-2);
    border-radius: 8px; padding: 8px; }
  .galeria { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .lleno .galeria { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
  .galeria figure { background: var(--panel-2); border-radius: 10px; overflow: hidden; }
  .galeria img { width: 100%; display: block; }
  .galeria figcaption { font-size: 10.5px; padding: 4px 6px; color: var(--texto-2);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mini-input { width: 100%; padding: 8px 10px; border-radius: 8px;
    border: 1px solid var(--borde); background: var(--panel-2);
    color: var(--texto); font: inherit; font-size: 13px; margin-bottom: 8px; }
  .boton-panel { display: inline-flex; gap: 6px; align-items: center;
    padding: 8px 14px; border-radius: 10px; background: var(--acento);
    color: #fff; font-size: 13px; font-weight: 600; }
  #grafo-svg { width: 100%; height: 300px; background: var(--panel-2);
    border-radius: 10px; touch-action: none; }
  .lleno #grafo-svg { height: calc(100% - 130px); }
  #grafo-detalle { margin-top: 8px; }
  .leyenda-grafo { display: flex; flex-wrap: wrap; gap: 6px 10px; align-items: center;
    font-size: 12px; }
  .leyenda-grafo b { width: 100%; margin-bottom: 2px; font-size: 12px; }
  .chip-tema { display: inline-flex; align-items: center; gap: 5px;
    color: var(--texto); }
  .chip-tema i { width: 11px; height: 11px; border-radius: 3px; display: inline-block; }
  .chip-tema small { color: var(--texto-2); }
  #flujo-editor { width: 100%; min-height: 40vh; font-family: ui-monospace, monospace;
    font-size: 12px; background: var(--panel-2); color: var(--texto);
    border: 1px solid var(--borde); border-radius: 8px; padding: 8px; }
  .lleno #flujo-editor { min-height: calc(100vh - 210px); }
  iframe.oficina { width: 100%; height: 320px; border: none; border-radius: 10px;
    background: #000; }
  /* ── Jarvis: constelación 3D de voz ── */
  #jarvis { position: fixed; inset: 0; z-index: 60; background:
    radial-gradient(circle at 50% 42%, #0a1a14 0%, #050a0f 55%, #000 100%);
    display: flex; flex-direction: column; }
  #jarvis[hidden] { display: none; }
  /* ── RAG 3D: cilindro de memoria ── */
  #rag { position: fixed; inset: 0; z-index: 61; background:
    radial-gradient(circle at 50% 45%, #0a1420 0%, #05080d 55%, #000 100%);
    display: flex; flex-direction: column; }
  #rag[hidden] { display: none; }
  #rag-lienzo { position: absolute; inset: 0; width: 100%; height: 100%;
    touch-action: none; }
  #rag-barra { position: relative; z-index: 2; display: flex; align-items: center;
    gap: 10px; padding: 12px 14px; color: #eaf3ff; }
  #rag-titulo { font-weight: 700; font-size: 15px; text-shadow: 0 0 12px rgba(74,144,217,.8); }
  #rag-experto { margin-left: auto; background: rgba(255,255,255,.08); color: #eaf3ff;
    border: 1px solid rgba(255,255,255,.14); border-radius: 8px; padding: 6px 8px;
    font-size: 12px; max-width: 42%; }
  #rag-2d { min-width: 40px; font-weight: 700; font-size: 13px; }
  #rag-2d.on { background: rgba(74,144,217,.35); border-color: #4a90d9; }
  #rag-info { position: relative; z-index: 2; margin: 0 14px; color: #bcd6f2;
    font-size: 13px; min-height: 20px; pointer-events: none;
    text-shadow: 0 0 8px rgba(0,0,0,.9); }
  #jarvis-lienzo { position: absolute; inset: 0; width: 100%; height: 100%;
    touch-action: none; }
  #jarvis-barra { position: relative; z-index: 2; display: flex; align-items: center;
    gap: 10px; padding: 12px 14px; color: #eafff3; }
  #jarvis-titulo { font-weight: 700; font-size: 15px; letter-spacing: .5px;
    text-shadow: 0 0 12px rgba(46,168,108,.8); }
  .jarvis-btn { width: 38px; height: 38px; border-radius: 50%; display: grid;
    place-items: center; background: rgba(255,255,255,.08); color: #eafff3;
    border: 1px solid rgba(255,255,255,.14); }
  .jarvis-btn.on { background: rgba(46,168,108,.35); border-color: #2ea86c; }
  #jarvis-voz { margin-left: auto; }
  #jarvis-info { position: relative; z-index: 2; margin: 0 14px;
    color: #bfe9d4; font-size: 13px; min-height: 20px;
    text-shadow: 0 0 8px rgba(0,0,0,.9); pointer-events: none; }
  #jarvis-tiles { position: relative; z-index: 2; margin-top: auto;
    display: flex; gap: 8px; overflow-x: auto; padding: 12px 14px 16px; }
  .jarvis-tile { flex: 0 0 auto; display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 13px; border-radius: 12px; font-size: 12.5px; font-weight: 600;
    color: #eafff3; background: rgba(255,255,255,.07);
    border: 1px solid rgba(255,255,255,.13); white-space: nowrap; }
  .jarvis-tile:active { background: rgba(46,168,108,.3); }
  /* filtro de expertos en el chat */
  #filtro-expertos { display: flex; gap: 6px; overflow-x: auto; padding: 6px 10px;
    border-bottom: 1px solid var(--borde); background: var(--panel);
    scrollbar-width: none; }
  #filtro-expertos.oculto { display: none; }
  .chip-exp { flex: 0 0 auto; display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 9px; border-radius: 12px; font-size: 11.5px; font-weight: 600;
    border: 1px solid var(--borde); color: var(--texto-2); background: var(--panel-2);
    white-space: nowrap; }
  .chip-exp.activo { color: #fff; }
  .chip-exp i { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
</style>
</head>
<body>

<script>
"use strict";
const S = { proyectos: [], proyecto: null, sesion: null, ws: null,
            comandos: [], vistaIzq: "proyectos", flujos: [] };
const $ = id => document.getElementById(id);
const chat = $("chat");

/* ── Tema ── */
function aplicarTema(t) {
  document.documentElement.dataset.tema = t;
  localStorage.setItem("tema", t);
  $("icono-luna").style.display = t === "oscuro" ? "" : "none";
  $("icono-sol").style.display = t === "claro" ? "" : "none";
  document.querySelector('meta[name=theme-color]')
    .setAttribute("content", t === "oscuro" ? "#0e1613" : "#f2f6f3");
}
aplicarTema(localStorage.getItem("tema") || "oscuro");
$("btn-tema").onclick = () =>
  aplicarTema(document.documentElement.dataset.tema === "oscuro" ? "claro" : "oscuro");

async function api(ruta, opciones) { const r = await fetch(ruta, opciones); return r.json(); }

/* ── Clasificacion de lineas: logs FUERA del chat ── */
const ES_LOG = t => /^\d{4}-\d{2}-\d{2} .*\|\s*(INFO|WARNING|DEBUG|ERROR)\s*\|/.test(t);
const ES_PENSANDO = t =>
  /^\s*(\[detail\]|paso \d|\[research\]|\[planner\]|\[generator\]|\[evaluator\]|\[storage\]|\[vista\]|\[contra\]|\[github\]|\[arxiv\]|\[hf\])/.test(t);
const ES_ACCION = t => /^(RESULTADO |ACCION|\$ |Archivos escritos|Correccion|Defectos)/.test(t);
const RUTA_PNG = /([A-Za-z]:\\[^ ]*?\.png|[A-Za-z]:\/[^ ]*?\.png)/;

let logsBuffer = [];
function registrarLog(texto) {
  logsBuffer.push(texto);
  if (logsBuffer.length > 400) logsBuffer = logsBuffer.slice(-400);
  $("cuerpo-registro").textContent = logsBuffer.join("\n");
}

/* ── Markdown → HTML (compacto y seguro: escapa antes de formatear) ── */
function escHTML(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;")
          .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}
function mdInline(s) {
  // s ya viene escapado; aplicar solo inline
  s = s.replace(/`([^`]+)`/g, (m, c) => "<code>" + c + "</code>");
  s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  s = s.replace(/__([^_]+)__/g, "<strong>$1</strong>");
  s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, "$1<em>$2</em>");
  s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g,
                '<a href="$2" target="_blank" rel="noopener">$1</a>');
  return s;
}
function mdHTML(texto) {
  const lineas = texto.split("\n");
  let html = "", i = 0, tipoLista = null;
  const cerrarLista = () => { if (tipoLista) { html += "</" + tipoLista + ">"; tipoLista = null; } };
  while (i < lineas.length) {
    let l = lineas[i];
    // bloque de codigo cercado ```
    const fence = l.match(/^\s*```(\w*)\s*$/);
    if (fence) {
      cerrarLista();
      const buf = [];
      i++;
      while (i < lineas.length && !/^\s*```\s*$/.test(lineas[i])) { buf.push(lineas[i]); i++; }
      i++; // saltar el cierre
      html += "<pre><code>" + escHTML(buf.join("\n")) + "</code></pre>";
      continue;
    }
    const esc = escHTML(l);
    // encabezados #..######
    const h = esc.match(/^\s*(#{1,6})\s+(.*)$/);
    if (h) { cerrarLista(); const n = h[1].length;
      html += "<h" + n + ">" + mdInline(h[2]) + "</h" + n + ">"; i++; continue; }
    // separador ---
    if (/^\s*([-*_])\1\1+\s*$/.test(l)) { cerrarLista(); html += "<hr>"; i++; continue; }
    // cita >
    const bq = esc.match(/^\s*&gt;\s?(.*)$/);
    if (bq) { cerrarLista(); html += "<blockquote>" + mdInline(bq[1]) + "</blockquote>"; i++; continue; }
    // lista ordenada
    const ol = esc.match(/^\s*\d+[.)]\s+(.*)$/);
    if (ol) { if (tipoLista !== "ol") { cerrarLista(); html += "<ol>"; tipoLista = "ol"; }
      html += "<li>" + mdInline(ol[1]) + "</li>"; i++; continue; }
    // lista con viñetas
    const ul = esc.match(/^\s*[-*+]\s+(.*)$/);
    if (ul) { if (tipoLista !== "ul") { cerrarLista(); html += "<ul>"; tipoLista = "ul"; }
      html += "<li>" + mdInline(ul[1]) + "</li>"; i++; continue; }
    // linea en blanco
    if (!esc.trim()) { cerrarLista(); i++; continue; }
    // parrafo (juntar lineas contiguas)
    cerrarLista();
    const parr = [esc];
    i++;
    while (i < lineas.length && lineas[i].trim() &&
           !/^\s*(#{1,6}\s|```|[-*+]\s|\d+[.)]\s|&gt;|([-*_])\2\2)/.test(escHTML(lineas[i]))) {
      parr.push(escHTML(lineas[i])); i++;
    }
    html += "<p>" + mdInline(parr.join(" ")) + "</p>";
  }
  cerrarLista();
  return html;
}

let grupoActividad = null;   // el bloque plegable abierto de actividad
let grupoCognia = null;      // el bloque de respuesta de Cognia en curso
let cogniaRaw = "";          // texto crudo acumulado para re-renderizar markdown

function filaActividad(texto) {
  // linea larga o multilinea: resumen + contenido expandible (+/-)
  if (texto.length > 110 || texto.includes("\n")) {
    const d = document.createElement("details");
    d.className = "act-larga";
    const sm = document.createElement("summary");
    sm.textContent = texto.slice(0, 90).replace(/\s+/g, " ") + "…";
    const pre = document.createElement("pre");
    pre.textContent = texto;
    d.append(sm, pre);
    return d;
  }
  const div = document.createElement("div");
  div.className = "act-linea";
  div.textContent = texto;
  return div;
}

function burbujaActividad(texto) {
  if (!grupoActividad || !chat.contains(grupoActividad)) grupoActividad = null;
  if (!grupoActividad) {
    grupoActividad = document.createElement("details");
    grupoActividad.className = "actividad";
    grupoActividad.open = true;      // se ve llegar en vivo; el − lo pliega
    grupoActividad.innerHTML =
      '<summary><svg class="ic" width="14" height="14"><use href="#i-rayo"/></svg>' +
      '<span class="act-titulo">Actividad</span><span class="mas-menos"></span></summary>' +
      '<div class="items"></div>';
    chat.appendChild(grupoActividad);
  }
  grupoActividad.querySelector(".items").appendChild(filaActividad(texto));
  const n = grupoActividad.querySelectorAll(".items > *").length;
  grupoActividad.querySelector(".act-titulo").textContent =
    "Actividad · " + n + (n === 1 ? " paso" : " pasos");
  chat.scrollTop = chat.scrollHeight;
  // imagen inline tambien dentro de la actividad
  const png = texto.match(RUTA_PNG);
  if (png) {
    const img = document.createElement("img");
    img.className = "inline"; img.loading = "lazy";
    img.src = "/api/imagen?ruta=" + encodeURIComponent(png[1]);
    img.onerror = () => img.remove();
    grupoActividad.querySelector(".items").appendChild(img);
  }
}

function agregarImagen(cont, texto) {
  const png = texto.match(RUTA_PNG);
  if (!png) return;
  const img = document.createElement("img");
  img.className = "inline"; img.loading = "lazy";
  img.src = "/api/imagen?ruta=" + encodeURIComponent(png[1]);
  img.onerror = () => img.remove();
  cont.appendChild(img);
}

// La respuesta de Cognia se acumula en UN bloque continuo (sin globos por
// linea) y se re-renderiza como markdown cada vez que llega otra linea.
function burbujaCognia(texto, hora) {
  if (!grupoCognia || !chat.contains(grupoCognia)) { grupoCognia = null; cogniaRaw = ""; }
  if (!grupoCognia) {
    grupoCognia = document.createElement("div");
    grupoCognia.className = "msg cognia bloque";
    grupoCognia.innerHTML = '<div class="md"></div>';
    if (hora) {
      const h = document.createElement("span");
      h.className = "hora"; h.textContent = hora; grupoCognia.appendChild(h);
    }
    chat.appendChild(grupoCognia);
  }
  cogniaRaw += (cogniaRaw ? "\n" : "") + texto;
  grupoCognia.querySelector(".md").innerHTML = mdHTML(cogniaRaw);
  agregarImagen(grupoCognia, texto);
  chat.scrollTop = chat.scrollHeight;
}

function burbuja(quien, texto, hora) {
  texto = texto.replace(/\[\/?[a-z_]+\]/g, "");
  // el servidor ya clasifica: quien=="log" va directo al Registro
  if (quien === "log" || (quien === "cognia" && ES_LOG(texto))) {
    registrarLog(texto); return;
  }
  // ACTIVIDAD: agrupada en bloque plegable +/- dentro del chat
  if (quien === "actividad" ||
      (quien === "cognia" && (ES_PENSANDO(texto) || ES_ACCION(texto)))) {
    grupoCognia = null;      // la actividad cierra el bloque de respuesta
    if (typeof dispararPorActividad === "function") dispararPorActividad(texto);
    if (filtroTapa("actividad", texto)) return;   // filtro de expertos del chat
    burbujaActividad(texto); return;
  }
  grupoActividad = null;   // un mensaje normal cierra el grupo de actividad
  // RESPUESTA de Cognia: un solo bloque, markdown renderizado
  if (quien === "cognia") {
    if (filtroTapa("cerebro", texto)) return;
    if (typeof hablarCognia === "function") hablarCognia(texto);
    burbujaCognia(texto, hora); return;
  }
  // usuario / sistema: burbuja simple
  grupoCognia = null;
  const div = document.createElement("div");
  const clase = quien === "usuario" ? "yo" : "sistema";
  div.className = "msg " + clase;
  div.textContent = texto;
  agregarImagen(div, texto);
  if (hora && clase !== "sistema") {
    const h = document.createElement("span");
    h.className = "hora"; h.textContent = hora; div.appendChild(h);
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  if (texto.includes("☐") || texto.includes("☑"))
    $("cuerpo-tareas").innerHTML = "<pre>" +
      texto.replace(/&/g, "&amp;").replace(/</g, "&lt;") + "</pre>";
}

/* ── Saludo ── */
api("/api/saludo").then(s => {
  $("saludo").innerHTML = "<b>Cognia</b> · " + s.texto +
    "<br><small>Abre el menú para elegir proyecto y sesión.</small>";
});

/* ── Cajones ── */
function abrir(cajon, si) {
  $(cajon).classList.toggle("abierto", si);
  $("velo").classList.toggle("activo",
    $("cajon-izq").classList.contains("abierto") ||
    $("cajon-der").classList.contains("abierto"));
}
$("btn-izq").onclick = () => { pintarIzq(); abrir("cajon-izq", true); };
$("btn-der").onclick = () => { refrescarPaneles(); abrir("cajon-der", true); };
$("velo").onclick = () => { abrir("cajon-izq", false); abrir("cajon-der", false); };

/* ── Pantalla completa de paneles ── */
document.querySelectorAll(".expandir").forEach(b => {
  b.addEventListener("click", e => {
    e.preventDefault(); e.stopPropagation();
    const panel = $(b.dataset.full);
    const lleno = panel.classList.toggle("lleno");
    panel.open = true;
    b.querySelector("use").setAttribute("href", lleno ? "#i-contraer" : "#i-expandir");
    if (b.dataset.full === "panel-grafo") pintarGrafoVisual();

/* ── Grafo de bolitas: temas por color, conexiones, concepto al tocar ── */
const PALETA = ["#2ea86c", "#4a90d9", "#d9a441", "#c95fa4", "#5fc9c0",
                "#d96a4a", "#8f7ae8", "#a3c94a", "#e05b7c", "#57a0e0"];
const corta = (s, n) => (s && s.length > n ? s.slice(0, n - 1) + "…" : (s || ""));
// nombre legible para MOSTRAR (los conceptos del KG son claves snake_case);
// el nombre crudo se conserva para consultar /api/grafo.
const linda = (s, n) => corta((s || "").replace(/_/g, " ").trim(), n);
const escSVG = s => (s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
async function pintarGrafoVisual() {
  const g = await api("/api/grafo_visual?limite=60");
  const svg = $("grafo-svg");
  const det = $("grafo-detalle");
  if (g.error || !g.nodos.length) {
    svg.innerHTML = `<text x="20" y="40" fill="var(--texto-2)" font-size="12">${g.error || "Grafo vacío."}</text>`;
    return;
  }
  const lleno = $("panel-grafo").classList.contains("lleno");
  // agrupar por tema; el "nombre del tema" = su hub (o el primer concepto)
  const temas = {};
  for (const n of g.nodos) (temas[n.tema] = temas[n.tema] || []).push(n);
  const claves = Object.keys(temas);
  const nombreTema = {};
  claves.forEach(t => {
    const hub = temas[t].find(n => n.hub) || temas[t][0];
    nombreTema[t] = t < 0 ? "sueltos" : linda(hub.nombre, 18);
  });
  const cols = Math.ceil(Math.sqrt(claves.length));
  const filas = Math.ceil(claves.length / cols);
  const W = 400, H = 300, cw = W / cols, chh = H / filas;
  const pos = {};
  let headers = "";
  claves.forEach((t, i) => {
    const cx = (i % cols) * cw + cw / 2;
    const cy0 = Math.floor(i / cols) * chh;
    const cy = cy0 + chh / 2 + 6;
    const color = t < 0 ? "#8a9a90" : PALETA[t % PALETA.length];
    // titulo del tema arriba de la celda: se lee de que va el grupo
    headers += `<text x="${cx.toFixed(1)}" y="${(cy0 + 12).toFixed(1)}" text-anchor="middle" font-size="9" font-weight="600" fill="${color}" pointer-events="none">${escSVG(nombreTema[t])}</text>`;
    let miembros = temas[t];
    let resto = [];
    if (miembros.length > 15) {
      resto = miembros.slice(14);
      miembros = miembros.slice(0, 14);
      miembros.push({id: "mas-" + t, nombre: "+" + resto.length,
                     tema: miembros[0].tema, mas: resto.map(x => x.nombre)});
    }
    const r = Math.min(cw, chh) / 2 - 20;
    miembros.forEach((n, j) => {
      let dx = 0, dy = 0;
      if (miembros.length > 1) {
        const ang = (2 * Math.PI * j) / miembros.length - Math.PI / 2;
        dx = r * Math.cos(ang); dy = r * Math.sin(ang);
      }
      pos[n.id] = { x: cx + dx, y: cy + dy, color,
        hub: !!n.hub, mas: n.mas || null, nombre: n.nombre };
    });
  });
  let out = "";
  for (const a of g.aristas) {
    const p1 = pos[a.de], p2 = pos[a.a];
    if (p1 && p2)
      out += `<line x1="${p1.x.toFixed(1)}" y1="${p1.y.toFixed(1)}" x2="${p2.x.toFixed(1)}" y2="${p2.y.toFixed(1)}" stroke="${p1.color}" stroke-opacity="0.3" stroke-width="1"/>`;
  }
  let etiquetas = "";
  for (const [id, p] of Object.entries(pos)) {
    const rr = p.hub || p.mas ? 9 : 6;
    out += `<circle data-nombre="${escSVG(p.nombre)}" cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${rr}" fill="${p.color}" stroke="var(--fondo)" stroke-width="1.5" style="cursor:pointer"/>`;
    // etiqueta legible: siempre en hubs y en "+N"; y en TODOS al ver en grande
    if (p.mas) {
      etiquetas += `<text x="${p.x.toFixed(1)}" y="${p.y.toFixed(1)}" dy="3" text-anchor="middle" font-size="8" fill="#fff" pointer-events="none">${escSVG(p.nombre)}</text>`;
    } else if (p.hub || lleno) {
      etiquetas += `<text x="${p.x.toFixed(1)}" y="${(p.y + rr + 8).toFixed(1)}" text-anchor="middle" font-size="${lleno ? 8 : 8.5}" fill="var(--texto)" stroke="var(--fondo)" stroke-width="0.5" paint-order="stroke" pointer-events="none">${escSVG(linda(p.nombre, lleno ? 12 : 16))}</text>`;
    }
  }
  svg.innerHTML = headers + out + etiquetas +
    `<text x="6" y="294" fill="var(--texto-2)" font-size="9">${g.nodos.length} conceptos · ${g.n_temas} temas · toca una bolita</text>`;
  svg.querySelectorAll("circle").forEach(c =>
    c.addEventListener("click", () => {
      const nombre = c.dataset.nombre;
      const p = Object.values(pos).find(x => x.nombre === nombre);
      if (p && p.mas) {
        det.innerHTML = "<b>" + p.mas.length + " conceptos más</b><div>" +
          p.mas.map(n => `<button class=\"chip\" style=\"margin:3px\" onclick=\"verConcepto('${n.replace(/'/g, "")}')\">${escSVG(linda(n, 24))}</button>`).join("") + "</div>";
      } else verConcepto(nombre);
    }));
  // leyenda de temas: color -> de que va cada grupo (clave de la claridad)
  det.innerHTML = '<div class="leyenda-grafo"><b>Temas</b>' +
    claves.map(t => {
      const color = t < 0 ? "#8a9a90" : PALETA[t % PALETA.length];
      return `<span class="chip-tema"><i style="background:${color}"></i>${escSVG(nombreTema[t])} <small>(${temas[t].length})</small></span>`;
    }).join("") + '</div><div style="margin-top:6px;color:var(--texto-2);font-size:12px">Toca una bolita para ver el concepto y sus relaciones.</div>';
}
async function verConcepto(nombre) {

  $("grafo-detalle").innerHTML = `<b>${bonito}</b> — cargando…`;
  const g = await api("/api/grafo?tema=" + encodeURIComponent(nombre));

/* ══ Jarvis: constelación 3D de voz (cerebro central + expertos) ══ */
const JV = {
  abierto: false, nodos: [], porId: {}, pulsos: [], rot: 0,
  escala: 1, ox: 0, oy: 0, raf: 0, foco: null, vozOn: true,
  filtro: new Set(),   // ids visibles en el chat; vacío = todos
};
const lienzo = $("jarvis-lienzo");
const ctx2 = lienzo.getContext("2d");

async function cargarExpertos() {
  if (JV.nodos.length) return;
  const lista = await api("/api/expertos");
  // cerebro al centro; micro-expertos anillo interno; roles anillo externo
  const micro = lista.filter(e => e.tipo === "microexperto");
  const roles = lista.filter(e => e.tipo === "rol");
  const cerebro = lista.find(e => e.central) || lista[0];
  JV.nodos = [];
  const nc = { ...cerebro, x: 0, y: 0, r: 30, energia: 0.7, base: 0, anillo: 0 };
  JV.nodos.push(nc);
  const anillo = (arr, radio, r) => arr.forEach((e, i) => {
    const a = (2 * Math.PI * i) / Math.max(1, arr.length) - Math.PI / 2;
    JV.nodos.push({ ...e, base: a, radio, r,
      energia: 0.15, activo: e.activo !== false });
  });
  anillo(micro, 120, 16);
  anillo(roles, 210, 13);
  JV.porId = {};
  JV.nodos.forEach(n => JV.porId[n.id] = n);
}

function posNodo(n) {           // posición mundo -> pantalla
  const wx = n.anillo === 0 && n.central ? 0 : (n.radio || 0) * Math.cos(n.base + JV.rot);
  const wy = n.anillo === 0 && n.central ? 0 : (n.radio || 0) * Math.sin(n.base + JV.rot);
  const cx = lienzo.width / 2 + JV.ox;
  const cy = lienzo.height * 0.44 + JV.oy;
  return { sx: cx + wx * JV.escala, sy: cy + wy * JV.escala, wx, wy };
}

function pintarJarvis() {
  const W = lienzo.width, H = lienzo.height;
  ctx2.clearRect(0, 0, W, H);
  const cerebro = JV.nodos[0];
  const pc = posNodo(cerebro);
  // líneas cerebro -> expertos
  for (const n of JV.nodos) {
    if (n === cerebro) continue;
    const p = posNodo(n);
    ctx2.beginPath(); ctx2.moveTo(pc.sx, pc.sy); ctx2.lineTo(p.sx, p.sy);
    ctx2.strokeStyle = n.color;
    ctx2.globalAlpha = 0.08 + 0.5 * n.energia;
    ctx2.lineWidth = 1 + 1.5 * n.energia;
    ctx2.stroke(); ctx2.globalAlpha = 1;
  }
  // pulsos de energía viajando (blanco + color del experto)
  JV.pulsos = JV.pulsos.filter(pu => pu.t < 1);
  for (const pu of JV.pulsos) {
    pu.t += 0.022;
    const n = pu.nodo, p = posNodo(n);
    const x = pc.sx + (p.sx - pc.sx) * pu.t, y = pc.sy + (p.sy - pc.sy) * pu.t;
    const rad = 7 * JV.escala;
    const g = ctx2.createRadialGradient(x, y, 0, x, y, rad);
    g.addColorStop(0, "#ffffff"); g.addColorStop(0.5, n.color);
    g.addColorStop(1, "rgba(0,0,0,0)");
    ctx2.fillStyle = g; ctx2.beginPath(); ctx2.arc(x, y, rad, 0, 7); ctx2.fill();
    if (pu.t >= 0.98) { n.energia = 1; }
  }
  // nodos con glow; opacos si inactivos
  for (const n of JV.nodos) {
    const p = posNodo(n);
    const central = n === cerebro;
    if (central) n.energia = 0.55 + 0.15 * Math.sin(Date.now() / 600);
    else n.energia = Math.max(n.activo === false ? 0.06 : 0.13, n.energia - 0.008);
    const r = (n.r + (central ? 6 * Math.abs(Math.sin(Date.now() / 700)) : 0)) * JV.escala;
    ctx2.save();
    ctx2.shadowColor = n.color;
    ctx2.shadowBlur = (central ? 34 : 10 + 26 * n.energia) * Math.min(1.5, JV.escala);
    ctx2.globalAlpha = central ? 1 : (0.28 + 0.72 * n.energia);
    ctx2.fillStyle = n.color;
    ctx2.beginPath(); ctx2.arc(p.sx, p.sy, r, 0, 7); ctx2.fill();
    ctx2.restore();
    // núcleo blanco cuando "habla"
    if (n.energia > 0.6) {
      ctx2.globalAlpha = (n.energia - 0.6) * 2.2;
      ctx2.fillStyle = "#fff";
      ctx2.beginPath(); ctx2.arc(p.sx, p.sy, r * 0.4, 0, 7); ctx2.fill();
      ctx2.globalAlpha = 1;
    }
    // etiqueta si activo/foco/cerebro
    if (central || n.energia > 0.35 || JV.foco === n) {
      ctx2.globalAlpha = central ? 1 : Math.min(1, n.energia + 0.4);
      ctx2.fillStyle = "#eafff3";
      ctx2.font = (central ? 14 : 11) + "px system-ui, sans-serif";
      ctx2.textAlign = "center";
      ctx2.fillText(n.nombre, p.sx, p.sy + r + (central ? 18 : 13));
      ctx2.globalAlpha = 1;
    }
  }
  JV.rot += 0.0016;   // rotación lenta: la constelación "respira"
  if (JV.abierto) JV.raf = requestAnimationFrame(pintarJarvis);
}

function ajustarLienzo() {
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  lienzo.width = lienzo.clientWidth * dpr;
  lienzo.height = lienzo.clientHeight * dpr;
}

function hablar(texto) {
  if (!JV.vozOn || !texto || !window.speechSynthesis) return;
  try {
    const u = new SpeechSynthesisUtterance(texto.slice(0, 240));
    u.lang = "es-ES"; u.rate = 1.04; u.pitch = 1;
    const es = speechSynthesis.getVoices().find(v => v.lang.startsWith("es"));
    if (es) u.voice = es;
    speechSynthesis.speak(u);
  } catch (e) {}
}
// pausa entre líneas: acumula la respuesta y la habla al cerrarse el bloque
let _vozBuffer = "", _vozTimer = 0;
function hablarCognia(texto) {
  _vozBuffer += " " + texto;
  clearTimeout(_vozTimer);
  _vozTimer = setTimeout(() => {
    const t = _vozBuffer.trim(); _vozBuffer = "";
    if (t) { hablar(t); JV.nodos[0] && (JV.nodos[0].energia = 1); }
  }, 900);
}

// mapear una línea de actividad a un experto y dispararlo
const _MAP_EXP = [
  [/escribir_archivo|leer_archivo|apendar|copiar_archivo/, "generador"],
  [/\bejecutar\b|\$ /, "evaluador"],
  [/\[planner\]|Plan(?: de subtareas)?:|jefe planificando/, "planificador"],
  [/\[generator\]|generar_codigo/, "generador"],
  [/\[evaluator\]|Objetivo verificado/, "evaluador"],
  [/\[research\]|\[arxiv\]|\[hf\]|investigar/, "investigador"],
  [/buscar|\[github\]|busqueda/, "busqueda_web"],
  [/\[vista\]/, "vista"],
  [/Critico|\[contra\]|Remate/, "critico"],
  [/juez/i, "juez"],
  [/lector|navega/, "lector_web"],
];
function dispararPorActividad(texto) {
  for (const [re, id] of _MAP_EXP) {
    if (re.test(texto)) { dispararExperto(id); return; }
  }
}
function dispararExperto(id) {
  const n = JV.porId[id];
  if (!n) return;
  JV.pulsos.push({ nodo: n, t: 0 });
  if (JV.abierto && JV.vozOn) hablar(n.nombre);
}

function focoEn(n) {
  JV.foco = n;
  const p = posNodo(n);
  // centra el nodo y acerca
  JV.ox += (lienzo.width / 2 - p.sx);
  JV.oy += (lienzo.height * 0.44 - p.sy);
  JV.escala = Math.min(2.4, JV.escala * 1.25);
  $("jarvis-info").textContent = n.nombre + " — " + (n.descripcion || "");
  n.energia = 1;
  hablar(n.nombre + ". " + (n.descripcion || ""));
}

async function abrirJarvis() {
  await cargarExpertos();
  $("jarvis").hidden = false;
  JV.abierto = true;
  requestAnimationFrame(() => { ajustarLienzo(); JV.raf = requestAnimationFrame(pintarJarvis); });
}
function cerrarJarvis() {
  JV.abierto = false; cancelAnimationFrame(JV.raf);
  $("jarvis").hidden = true;
  if (window.speechSynthesis) speechSynthesis.cancel();
}
$("btn-jarvis").onclick = abrirJarvis;
$("jarvis-cerrar").onclick = cerrarJarvis;
$("jarvis-voz").onclick = function () {
  JV.vozOn = !JV.vozOn; this.classList.toggle("on", JV.vozOn);
  if (!JV.vozOn && window.speechSynthesis) speechSynthesis.cancel();
};
$("jarvis-voz").classList.toggle("on", JV.vozOn);
$("jarvis-tiles").querySelectorAll(".jarvis-tile").forEach(t =>
  t.onclick = () => { cerrarJarvis(); abrirPanel(t.dataset.abre); });

// gestos: pan (1 dedo), zoom (rueda / pellizco), tap = enfocar nodo
let _pt = new Map(), _movido = false, _iniD = 0, _iniEsc = 1;
lienzo.addEventListener("pointerdown", e => {
  lienzo.setPointerCapture(e.pointerId);
  _pt.set(e.pointerId, { x: e.clientX, y: e.clientY });
  _movido = false;
  if (_pt.size === 2) {
    const [a, b] = [..._pt.values()];
    _iniD = Math.hypot(a.x - b.x, a.y - b.y); _iniEsc = JV.escala;
  }
});
lienzo.addEventListener("pointermove", e => {
  const prev = _pt.get(e.pointerId); if (!prev) return;
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  if (_pt.size === 2) {
    _pt.set(e.pointerId, { x: e.clientX, y: e.clientY });
    const [a, b] = [..._pt.values()];
    const d = Math.hypot(a.x - b.x, a.y - b.y);
    if (_iniD) JV.escala = Math.max(0.5, Math.min(3, _iniEsc * d / _iniD));
    _movido = true; return;
  }
  const dx = (e.clientX - prev.x) * dpr, dy = (e.clientY - prev.y) * dpr;
  if (Math.abs(e.clientX - prev.x) + Math.abs(e.clientY - prev.y) > 3) _movido = true;
  JV.ox += dx; JV.oy += dy;
  _pt.set(e.pointerId, { x: e.clientX, y: e.clientY });
});
lienzo.addEventListener("pointerup", e => {
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  if (!_movido && _pt.size === 1) {
    const mx = e.clientX * dpr - lienzo.getBoundingClientRect().left * dpr;
    const my = e.clientY * dpr - lienzo.getBoundingClientRect().top * dpr;
    let hit = null, mejor = 1e9;
    for (const n of JV.nodos) {
      const p = posNodo(n);
      const d = Math.hypot(p.sx - mx, p.sy - my);
      if (d < (n.r + 14) * JV.escala && d < mejor) { mejor = d; hit = n; }
    }
    if (hit) focoEn(hit);
  }
  _pt.delete(e.pointerId);
});
lienzo.addEventListener("wheel", e => {
  e.preventDefault();
  JV.escala = Math.max(0.5, Math.min(3, JV.escala * (e.deltaY < 0 ? 1.1 : 0.9)));
}, { passive: false });
window.addEventListener("resize", () => { if (JV.abierto) ajustarLienzo(); });

/* ══ RAG 3D: cilindro de memoria (pisos = temas) ══ */
const RG = {
  abierto: false, pisos: [], nodos: [], rotY: 0.5, tilt: 0.5, zoom: 1,
  ox: 0, oy: 0, raf: 0, modo2d: false, experto: "",
};
const ragL = $("rag-lienzo");
const ctxR = ragL.getContext("2d");
// color pastel semitransparente por tema (piso)
const PASTEL = ["rgba(120,200,150,0.16)", "rgba(120,170,220,0.16)",
  "rgba(220,190,120,0.16)", "rgba(210,130,180,0.16)", "rgba(120,210,205,0.16)",
  "rgba(220,140,110,0.16)", "rgba(170,140,225,0.16)", "rgba(180,210,120,0.16)",
  "rgba(225,130,150,0.16)", "rgba(120,170,220,0.16)"];
const VIVO = ["#37e08a", "#4aa8ff", "#ffcb45", "#ff6fb1", "#3ff0e0",
  "#ff7b4a", "#a884ff", "#b6e34a", "#ff5b7c", "#57b0ff"];

async function cargarRAG() {
  const g = await api("/api/grafo_visual?limite=90");
  RG.pisos = []; RG.nodos = [];
  if (g.error || !g.nodos.length) { $("rag-info").textContent = g.error || "Memoria vacía."; return; }
  const temas = {};
  for (const n of g.nodos) (temas[n.tema] = temas[n.tema] || []).push(n);
  let keys = Object.keys(temas).sort((a, b) => temas[b].length - temas[a].length);
  // filtro por experto: subgrafo cuyos nombres casan la palabra del experto
  if (RG.experto) {
    const kw = RG.experto.replace(/_/g, "");
    const casa = n => (n.nombre || "").toLowerCase().replace(/_/g, "").includes(kw);
    keys = keys.filter(t => temas[t].some(casa));
  }
  const N = keys.length;
  const GAP = 78, R = 96;
  keys.forEach((t, i) => {
    const y = (i - (N - 1) / 2) * GAP;
    const color = t < 0 ? "rgba(150,160,155,0.14)" : PASTEL[t % PASTEL.length];
    const vivo = t < 0 ? "#9aa" : VIVO[t % VIVO.length];
    const hub = temas[t].find(n => n.hub) || temas[t][0];
    RG.pisos.push({ y, R, color, vivo, nombre: (hub.nombre || "").replace(/_/g, " ") });
    temas[t].forEach((n, j) => {
      const a = (2 * Math.PI * j) / Math.max(1, temas[t].length);
      RG.nodos.push({ x: R * Math.cos(a), y, z: R * Math.sin(a), vivo,
        nombre: (n.nombre || "").replace(/_/g, " "), raw: n.nombre });
    });
  });
  $("rag-info").textContent = N + " pisos (temas) · " + RG.nodos.length + " conceptos";
}

function proyRAG(x, y, z) {
  const cy = Math.cos(RG.rotY), sy = Math.sin(RG.rotY);
  let X = x * cy - z * sy, Z = x * sy + z * cy, Y = y;
  const ct = Math.cos(RG.tilt), st = Math.sin(RG.tilt);
  const Y2 = Y * ct - Z * st, Z2 = Y * st + Z * ct;
  const focal = 520;
  const esc = RG.modo2d ? RG.zoom : (focal / (focal + Z2)) * RG.zoom * 1.15;
  return { sx: ragL.width / 2 + RG.ox + X * esc, sy: ragL.height / 2 + RG.oy + Y2 * esc, z: Z2 };
}

function pintarRAG() {
  const W = ragL.width, H = ragL.height;
  ctxR.clearRect(0, 0, W, H);
  // eje vertical del cilindro
  if (RG.pisos.length) {
    const a = proyRAG(0, RG.pisos[0].y, 0), b = proyRAG(0, RG.pisos[RG.pisos.length - 1].y, 0);
    ctxR.beginPath(); ctxR.moveTo(a.sx, a.sy); ctxR.lineTo(b.sx, b.sy);
    ctxR.strokeStyle = "rgba(255,255,255,0.15)"; ctxR.lineWidth = 2; ctxR.stroke();
  }
  // pisos ordenados de atrás a adelante
  const pisosOrd = RG.pisos.map(p => ({ p, z: proyRAG(0, p.y, 0).z })).sort((a, b) => b.z - a.z);
  for (const { p } of pisosOrd) {
    ctxR.beginPath();
    for (let k = 0; k <= 40; k++) {
      const a = (2 * Math.PI * k) / 40;
      const q = proyRAG(p.R * Math.cos(a), p.y, p.R * Math.sin(a));
      k === 0 ? ctxR.moveTo(q.sx, q.sy) : ctxR.lineTo(q.sx, q.sy);
    }
    ctxR.closePath();
    ctxR.fillStyle = p.color; ctxR.fill();
    ctxR.strokeStyle = p.vivo; ctxR.globalAlpha = 0.5; ctxR.lineWidth = 1.2; ctxR.stroke();
    ctxR.globalAlpha = 1;
    // etiqueta del piso (tema)
    const c = proyRAG(-p.R, p.y, 0);
    ctxR.fillStyle = "#eaf3ff"; ctxR.font = "11px system-ui, sans-serif";
    ctxR.textAlign = "right"; ctxR.fillText(corta(p.nombre, 18), c.sx - 6, c.sy + 3);
  }
  // nodos (esferas vívidas) por profundidad
  const nOrd = RG.nodos.map(n => { const q = proyRAG(n.x, n.y, n.z); return { n, q }; })
    .sort((a, b) => b.q.z - a.q.z);
  for (const { n, q } of nOrd) {
    const r = (RG.modo2d ? 5 : (520 / (520 + q.z)) * 6) * RG.zoom;
    const g = ctxR.createRadialGradient(q.sx - r * 0.3, q.sy - r * 0.3, 0, q.sx, q.sy, r);
    g.addColorStop(0, "#fff"); g.addColorStop(0.35, n.vivo); g.addColorStop(1, n.vivo);
    ctxR.save(); ctxR.shadowColor = n.vivo; ctxR.shadowBlur = 8;
    ctxR.fillStyle = g; ctxR.beginPath(); ctxR.arc(q.sx, q.sy, Math.max(2, r), 0, 7); ctxR.fill();
    ctxR.restore();
    n._sx = q.sx; n._sy = q.sy; n._r = Math.max(2, r);
  }
  if (RG.abierto) RG.raf = requestAnimationFrame(pintarRAG);
}

function ajustarRAG() {
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  ragL.width = ragL.clientWidth * dpr; ragL.height = ragL.clientHeight * dpr;
}
async function abrirRAG() {
  cerrarJarvis();
  $("rag").hidden = false; RG.abierto = true;
  // poblar selector de expertos (grafo por experto)
  await cargarExpertos();
  const sel = $("rag-experto");
  sel.innerHTML = '<option value="">KG completo</option>' +
    JV.nodos.filter(n => !n.central).map(n => `<option value="${n.id}">${n.nombre}</option>`).join("");
  sel.value = RG.experto;
  await cargarRAG();
  requestAnimationFrame(() => { ajustarRAG(); RG.raf = requestAnimationFrame(pintarRAG); });
}
function cerrarRAG() { RG.abierto = false; cancelAnimationFrame(RG.raf); $("rag").hidden = true; }
$("tile-rag").onclick = abrirRAG;
$("rag-cerrar").onclick = cerrarRAG;
$("rag-2d").onclick = function () {
  RG.modo2d = !RG.modo2d; this.classList.toggle("on", RG.modo2d);
  if (RG.modo2d) { RG.tilt = Math.PI / 2 - 0.001; RG.rotY = 0; }   // cenital = mapa 2D
  else { RG.tilt = 0.5; RG.rotY = 0.5; }
};
$("rag-experto").onchange = async function () { RG.experto = this.value; await cargarRAG(); };

// gestos RAG: arrastre horiz = rotar, vert = inclinar, pellizco/rueda = zoom
let _rp = new Map(), _rMov = false, _rD = 0, _rZ = 1;
ragL.addEventListener("pointerdown", e => {
  ragL.setPointerCapture(e.pointerId); _rp.set(e.pointerId, { x: e.clientX, y: e.clientY }); _rMov = false;
  if (_rp.size === 2) { const [a, b] = [..._rp.values()]; _rD = Math.hypot(a.x - b.x, a.y - b.y); _rZ = RG.zoom; }
});
ragL.addEventListener("pointermove", e => {
  const prev = _rp.get(e.pointerId); if (!prev) return;
  if (_rp.size === 2) {
    _rp.set(e.pointerId, { x: e.clientX, y: e.clientY });
    const [a, b] = [..._rp.values()]; const d = Math.hypot(a.x - b.x, a.y - b.y);
    if (_rD) RG.zoom = Math.max(0.5, Math.min(3, _rZ * d / _rD)); _rMov = true; return;
  }
  const dx = e.clientX - prev.x, dy = e.clientY - prev.y;
  if (Math.abs(dx) + Math.abs(dy) > 3) _rMov = true;
  if (!RG.modo2d) {
    RG.rotY += dx * 0.008;
    RG.tilt = Math.max(-0.2, Math.min(Math.PI / 2, RG.tilt + dy * 0.006));
  } else { RG.ox += dx * (Math.min(2, window.devicePixelRatio || 1)); RG.oy += dy * (Math.min(2, window.devicePixelRatio || 1)); }
  _rp.set(e.pointerId, { x: e.clientX, y: e.clientY });
});
ragL.addEventListener("pointerup", e => {
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  if (!_rMov && _rp.size === 1) {
    const mx = e.clientX * dpr, my = e.clientY * dpr;
    let hit = null, mejor = 1e9;
    for (const n of RG.nodos) if (n._sx != null) {
      const d = Math.hypot(n._sx - mx, n._sy - my);
      if (d < (n._r + 12) && d < mejor) { mejor = d; hit = n; }
    }
    if (hit) { $("rag-info").textContent = hit.nombre; hablar(hit.nombre); }
  }
  _rp.delete(e.pointerId);
});
ragL.addEventListener("wheel", e => { e.preventDefault();
  RG.zoom = Math.max(0.5, Math.min(3, RG.zoom * (e.deltaY < 0 ? 1.1 : 0.9))); }, { passive: false });
window.addEventListener("resize", () => { if (RG.abierto) ajustarRAG(); });

/* ── Filtro de expertos en el chat: chips por color ── */
// clasifica una línea a un experto (para el filtro y el color del chat)
function expertoDeLinea(quien, texto) {
  if (quien === "cerebro") return "cerebro";
  for (const [re, id] of _MAP_EXP) if (re.test(texto)) return id;
  return "cerebro";
}
// ¿el filtro OCULTA esta línea? (filtro vacío = mostrar todo)
function filtroTapa(quien, texto) {
  if (!JV.filtro.size) return false;
  return !JV.filtro.has(expertoDeLinea(quien, texto));
}
async function pintarFiltroExpertos() {
  await cargarExpertos();
  const barra = $("filtro-expertos");
  barra.innerHTML = "";
  const chip = (id, nombre, color, sel) => {
    const b = document.createElement("button");
    b.className = "chip-exp" + (sel ? " activo" : "");
    if (sel) { b.style.background = color; b.style.borderColor = color; }
    b.innerHTML = `<i style="background:${color}"></i>${nombre}`;
    b.onclick = () => {
      if (id === "__todos") JV.filtro.clear();
      else if (JV.filtro.has(id)) JV.filtro.delete(id);
      else JV.filtro.add(id);
      pintarFiltroExpertos();
    };
    barra.appendChild(b);
  };
  chip("__todos", "Todos", "#2ea86c", JV.filtro.size === 0);
  for (const n of JV.nodos)
    chip(n.id, n.nombre, n.color, JV.filtro.has(n.id));
}

/* abrir un panel del cajón derecho por id lógico (usado por los tiles) */
function abrirPanel(cual) {
  const map = { grafo: "panel-grafo", oficina: "panel-oficina",
    imagenes: "panel-imagenes", flujos: "panel-flujos",
    tareas: "panel-tareas", registro: "panel-registro" };
  const id = map[cual]; if (!id) return;
  refrescarPaneles();
  abrir("cajon-der", true);
  const pan = $(id); if (pan) { pan.open = true; pan.scrollIntoView({ block: "nearest" }); }
  if (cual === "grafo") pintarGrafoVisual();
}

$("entrada").addEventListener("input", function () {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 110) + "px";
});
